
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Our List 💚">
<title>Our List 💚</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#FAF7F2;color:#1C1C1E;min-height:100vh;padding-bottom:100px}
.header{background:#fff;border-bottom:1px solid #E8E3DB;padding:20px 20px 0;position:sticky;top:0;z-index:10}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
h1{font-size:22px;font-weight:800}
.date{font-size:12px;color:#6B6B70}
.progress-label{font-size:13px;font-weight:700;color:#2A8B68}
.pbar-wrap{background:#E8E3DB;border-radius:4px;height:4px;width:80px;margin-top:4px;margin-left:auto;overflow:hidden}
.pbar-fill{height:100%;background:#2A8B68;border-radius:4px;transition:width .4s}
.tabs{display:flex}
.tab{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:700;border:none;background:none;cursor:pointer;color:#6B6B70;border-bottom:3px solid transparent;transition:all .15s}
.tab.active{color:#1C1C1E;border-bottom-color:#1C1C1E}
.section{padding:20px 20px 0}
.section-label{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#6B6B70;margin-bottom:12px;margin-top:8px}
.item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#fff;border-radius:14px;border:1px solid #E8E3DB;margin-bottom:8px;transition:all .15s}
.item.done{background:#EDF7F2;border-color:#A8D5C2}
.check{width:24px;height:24px;border-radius:8px;border:2px solid #E8E3DB;background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.check.checked{background:#2A8B68;border-color:#2A8B68}
.check-mark{color:#fff;font-size:13px;font-weight:800}
.item-text{font-size:15px;line-height:1.4;flex:1;padding-top:2px}
.item-text.done{color:#6B6B70;text-decoration:line-through}
.del{background:none;border:none;color:#D4CFC8;font-size:20px;cursor:pointer;padding:0 2px;-webkit-tap-highlight-color:transparent}
.add-section{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8E3DB;padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:10px}
.add-input{flex:1;border:1px solid #E8E3DB;border-radius:12px;padding:12px 14px;font-size:15px;font-family:'Outfit',sans-serif;outline:none;background:#FAF7F2}
.add-input:focus{border-color:#2A8B68}
.add-btn{background:#2A8B68;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:18px;font-weight:700;cursor:pointer}
.empty{text-align:center;padding:40px 20px;color:#6B6B70;font-size:15px}
.hint{margin:16px 20px 0;background:#EDF7F2;border:1px solid #A8D5C2;border-radius:14px;padding:14px 16px}
.hint p{font-size:13px;color:#2A8B68;font-weight:600;margin-bottom:4px}
.hint span{font-size:12px;color:#6B6B70;line-height:1.5;display:block}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div><h1>💚 Our List</h1><p class="date">April 20, 2026</p></div>
    <div style="text-align:right"><p class="progress-label" id="prog"></p><div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tChad" onclick="sw('chad')">👦 Chad</button>
    <button class="tab" id="tJoelle" onclick="sw('joelle')">👩 Joelle</button>
    <button class="tab" id="tAll" onclick="sw('all')">📋 All</button>
  </div>
</div>
<div id="hint" class="hint" style="display:none"><p>📱 Add to your home screen</p><span>Tap Share in Safari → "Add to Home Screen" to save this as an app icon.</span></div>
<div class="section" id="list" style="margin-bottom:80px"></div>
<div class="add-section">
  <input class="add-input" id="inp" placeholder="Add an item..." />
  <button class="add-btn" onclick="addItem()">+</button>
</div>
<script>
var BAKED={"chad":[{"text":"make date app","done":false,"id":1776723688901},{"text":"add list #1","done":false,"id":1776727450503},{"text":"drive home","done":false,"id":1776728084725}],"joelle":[{"text":"Task for Joelle","done":false,"id":1776727458731}]};
var LSKEY='ourlist_'+Object.keys(BAKED.chad).length+'_'+Object.keys(BAKED.joelle).length+'_'+(BAKED.chad.length+BAKED.joelle.length);
var data=JSON.parse(JSON.stringify(BAKED));
try{var _s=localStorage.getItem(LSKEY);if(_s){var _d=JSON.parse(_s);if(_d.chad&&_d.joelle)data=_d;}}catch(e){}
var cur='chad';
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(data));}catch(e){}}
function render(){
  var all=data.chad.concat(data.joelle);
  var done=all.filter(function(i){return i.done;}).length;
  var prog=document.getElementById('prog');var pbar=document.getElementById('pbar');
  if(prog)prog.textContent=done+'/'+all.length+' done';
  if(pbar)pbar.style.width=all.length?((done/all.length)*100)+'%':'0%';
  var c=document.getElementById('list');c.innerHTML='';
  var people=cur==='all'?['chad','joelle']:[cur];
  var names={chad:'👦 Chad',joelle:'👩 Joelle'};
  people.forEach(function(p){
    if(cur==='all'){var lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=names[p];c.appendChild(lbl);}
    if(!data[p].length){
      if(cur!=='all'){var e=document.createElement('div');e.className='empty';e.innerHTML='<div style="font-size:32px;margin-bottom:8px">📝</div><p>No items yet!<br/>Add one below.</p>';c.appendChild(e);}
      return;
    }
    data[p].forEach(function(item){
      var d=document.createElement('div');d.className='item'+(item.done?' done':'');
      d.innerHTML='<div class="check '+(item.done?'checked':'')+'" onclick="tog(''+p+'','+item.id+')">'+(item.done?'<span class="check-mark">✓</span>':'')+'</div><span class="item-text'+(item.done?' done':'')+'">'+esc(item.text)+'</span><button class="del" onclick="delItem(''+p+'','+item.id+')">×</button>';
      c.appendChild(d);
    });
  });
}
function sw(t){
  cur=t;
  ['chad','joelle','all'].forEach(function(x){var el=document.getElementById('t'+x.charAt(0).toUpperCase()+x.slice(1));if(el)el.classList.toggle('active',x===t);});
  var inp=document.getElementById('inp');
  if(t==='all'){inp.disabled=true;inp.style.opacity='0.5';inp.placeholder='Switch to a person tab to add items';}
  else{inp.disabled=false;inp.style.opacity='1';inp.placeholder='Add an item for '+(t==='chad'?'Chad':'Joelle')+'...';}
  render();
}
function addItem(){
  if(cur==='all')return;
  var v=document.getElementById('inp').value.trim();if(!v)return;
  data[cur].push({text:v,done:false,id:Date.now()});
  save();document.getElementById('inp').value='';render();
}
function tog(p,id){var item=data[p].find(function(x){return x.id===id;});if(item){item.done=!item.done;save();render();}}
function delItem(p,id){data[p]=data[p].filter(function(x){return x.id!==id;});save();render();}
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});
if(/^((?!chrome|android).)*safari/i.test(navigator.userAgent)&&!navigator.standalone){document.getElementById('hint').style.display='block';}
render();
